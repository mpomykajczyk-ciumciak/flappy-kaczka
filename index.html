      return await audioCtx.decodeAudioData(bytes.buffer);
    }
    [fartBuf, turboBuf] = await Promise.all([decode(FART_B64), decode(TURBO_B64)]);
    console.log('audio ready, fart dur:', fartBuf.duration, 'turbo dur:', turboBuf.duration);
  } catch(e){ console.warn('audio init error:', e); }
}

function playFart(mode){
  if(!audioCtx||!fartBuf) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(mode==='short'){
    const src=audioCtx.createBufferSource();
    src.buffer=fartBuf;
    const g=audioCtx.createGain(); g.gain.value=0.9;
    src.playbackRate.value=1.1+Math.random()*0.2;
    src.connect(g); g.connect(audioCtx.destination); src.start();
  } else {
    // 3 farts: short, medium, long (lower pitch = longer feel)
    [[0,1.1,1.0],[700,0.7,1.15],[1800,0.45,1.3]].forEach(([delay,rate,vol])=>{
      setTimeout(()=>{
        if(!audioCtx||!fartBuf) return;
        const s=audioCtx.createBufferSource();
        s.buffer=fartBuf;
        const g=audioCtx.createGain(); g.gain.value=vol;
        s.playbackRate.value=rate;
        s.connect(g); g.connect(audioCtx.destination); s.start();
      }, delay);
    });
  }
}

function startTurboSound(){
  if(!audioCtx||!turboBuf) return;
  stopTurboSound();
  turboSrc=audioCtx.createBufferSource();
  turboSrc.buffer=turboBuf;
  const g=audioCtx.createGain(); g.gain.value=1.0;
  turboSrc.connect(g); g.connect(audioCtx.destination);
  turboSrc.start();
  turboSrc.onended=()=>{ turboSrc=null; turboActive=false; };
}
function stopTurboSound(){
  if(turboSrc){ try{ turboSrc.stop(); }catch(e){} turboSrc=null; }
}

// --- SEASONS ---
const SEASONS=[
  {name:'Wiosna', emoji:'Wiosna',
   skyTop:'#0d0528',skyBot:'#0f2d1a',
   groundTop:'#2d5a1b',groundBot:'#1a3a10',grassCol:'#3d7a25',
   trunkCol:'#4a3010',leafCol:'#2a6a10', rain:false, snow:false},
  {name:'Jesien', emoji:'Jesien',
   skyTop:'#1a0a05',skyBot:'#2a1508',
   groundTop:'#4a2e08',groundBot:'#2a1a04',grassCol:'#6a3e10',
   trunkCol:'#3a2008',leafCol:'#7a3a08', rain:true, snow:false},
  {name:'Zima',   emoji:'Zima',
   skyTop:'#05101e',skyBot:'#0a1828',
   groundTop:'#1a2535',groundBot:'#0e1820',grassCol:'#1e2f40',
   trunkCol:'#2a2030',leafCol:'#1a2535', rain:false, snow:true},
  {name:'Lato',   emoji:'Lato',
   skyTop:'#050818',skyBot:'#0a1a30',
   groundTop:'#1a4010',groundBot:'#0e2808',grassCol:'#28600a',
   trunkCol:'#3a2a08',leafCol:'#1a5008', rain:false, snow:false},
];
let curSeason=0, prevSeason=0, blend=1.0;

function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function rgbToHex(r,g,b){ return '#'+(Math.round(r).toString(16).padStart(2,'0'))+(Math.round(g).toString(16).padStart(2,'0'))+(Math.round(b).toString(16).padStart(2,'0')); }
function lerpHex(a,b,t){ const [r1,g1,b1]=hexToRgb(a),[r2,g2,b2]=hexToRgb(b); return rgbToHex(r1+(r2-r1)*t,g1+(g2-g1)*t,b1+(b2-b1)*t); }
function lerpSeason(s1,s2,t){
  const keys=['skyTop','skyBot','groundTop','groundBot','grassCol','trunkCol','leafCol'];
  const out=Object.assign({},s2);
  keys.forEach(k=>{ out[k]=lerpHex(s1[k],s2[k],t); });
  return out;
}
function getSeasonForScore(sc){ return Math.floor(sc/20)%4; }
function updateSeasonBlend(sc){
  const idx=getSeasonForScore(sc);
  if(idx!==curSeason){ prevSeason=curSeason; curSeason=idx; blend=0; }
  if(blend<1) blend=Math.min(1,blend+0.003);
  return lerpSeason(SEASONS[prevSeason],SEASONS[curSeason],blend);
}

// --- WEATHER ---
let weatherParts=[];
function spawnWeather(sd){
  if(sd.rain && Math.random()<0.5)
    weatherParts.push({x:Math.random()*GW,y:-8,vx:-0.8,vy:14+Math.random()*5,type:'rain'});
  if(sd.snow && Math.random()<0.15)
    weatherParts.push({x:Math.random()*GW,y:-8,vx:(Math.random()-0.5)*1.2,vy:1.5+Math.random()*2,type:'snow',sz:2+Math.random()*4,rot:0});
}
function updateWeather(){
  weatherParts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.type==='snow') p.rot+=0.05; });
  weatherParts=weatherParts.filter(p=>p.y<GH+10);
  if(weatherParts.length>300) weatherParts.splice(0,50);
}
function drawWeather(){
  weatherParts.forEach(p=>{
    if(p.type==='rain'){
      ctx.strokeStyle='rgba(160,210,255,0.55)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+p.vx*2.5,p.y+p.vy*2.5); ctx.stroke();
    } else {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle='rgba(220,235,255,0.88)';
      ctx.beginPath(); ctx.arc(0,0,p.sz,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  });
}

// --- AUTUMN LEAVES ---
let leafParts=[];
function spawnLeaf(sd){
  if(sd.name!=='Jesien') return;
  if(Math.random()<0.04){
    const t=TREES[Math.floor(Math.random()*TREES.length)];
    leafParts.push({x:t.x+(Math.random()-0.5)*t.w,y:GH-55-t.h*0.6,
      vx:(Math.random()-0.5)*1.8,vy:0.8+Math.random()*1.5,
      rot:Math.random()*Math.PI*2,sz:4+Math.random()*4,hue:15+Math.random()*35,life:1});
  }
}
function updateLeaves(){
  leafParts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.rot+=0.06; p.life-=0.004; });
  leafParts=leafParts.filter(p=>p.life>0 && p.y<GH-50);
}
function drawLeaves(){
  leafParts.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle='hsl('+p.hue+',85%,50%)';
    ctx.beginPath(); ctx.ellipse(0,0,p.sz,p.sz*0.6,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

// --- STATIC SCENERY ---
const TREES=Array.from({length:8},(_,i)=>({x:i*(GW/7)+30,w:26+Math.random()*20,h:70+Math.random()*55}));
const STARS=Array.from({length:60},()=>({x:Math.random()*GW,y:Math.random()*GH*0.55,r:Math.random()*1.6+0.3,ph:Math.random()*Math.PI*2}));
const CLOUDS=Array.from({length:5},(_,i)=>({x:i*GW/4+50,y:35+Math.random()*100,w:90+Math.random()*90,sp:0.35+Math.random()*0.3}));

// --- GAME STATE ---
const S={WAIT:0,PLAY:1,DEAD:2};
let state=S.WAIT, score=0, best=0, frame=0;
let gameOverFartDone=false;

const DW=80, DH=120;
const duck={x:100, y:GH/2-DH/2, vy:0, rot:0};
const GRAVITY=0.38, JUMP=-8.5;

let turboActive=false;
let pointerDown=false, holdStart=0;
const HOLD_MS=350;

let pipes=[], pipeTimer=0;
const PIPE_W=68, PIPE_GAP=200, PIPE_SPEED=2.4;
const PIPE_EVERY=110;

let particles=[];

function addFlapFx(x,y){
  for(let i=0;i<8;i++) particles.push({x,y,vx:(Math.random()-0.5)*5,vy:Math.random()*-4-1,life:1,sz:Math.random()*10+4,hue:Math.random()*60+10,type:'f'});
}
function addTurboFx(){
  const cols=['#ff6600','#ffaa00','#fff','#00ccff','#ff00bb'];
  for(let i=0;i<7;i++) particles.push({
    x:duck.x+Math.random()*20, y:duck.y+DH/2+(Math.random()-0.5)*30,
    vx:-8-Math.random()*7, vy:(Math.random()-0.5)*3,
    life:1, sz:Math.random()*14+6,
    color:cols[Math.floor(Math.random()*cols.length)], type:'t'
  });
}

function spawnPipe(){
  const minT=80, maxT=GH-80-PIPE_GAP-60;
  pipes.push({x:GW+10, topH:Math.random()*(maxT-minT)+minT, scored:false});
}

function resetGame(){
  duck.y=GH/2-DH/2; duck.vy=0; duck.rot=0;
  pipes=[]; pipeTimer=0; score=0; frame=0; particles=[];
  turboActive=false; weatherParts=[]; leafParts=[];
  gameOverFartDone=false;
  blend=1; curSeason=0; prevSeason=0;
  state=S.PLAY;
}

function die(){
  state=S.DEAD;
  if(score>best) best=score;
  stopTurboSound();
  gameOverFartDone=false;
}

// --- INPUT ---
function onDown(){
  initAudio();
  pointerDown=true; holdStart=Date.now();
  if(state===S.WAIT){ resetGame(); return; }
  if(state===S.DEAD){ resetGame(); return; }
  // Normal jump
  duck.vy=JUMP;
  addFlapFx(duck.x+DW/2, duck.y+DH);
  playFart('short');
}
function onUp(){
  pointerDown=false;
  if(turboActive){ turboActive=false; stopTurboSound(); }
}

canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); onDown(); });
canvas.addEventListener('pointerup',   e=>{ e.preventDefault(); onUp(); });
canvas.addEventListener('pointercancel', ()=>onUp());
document.addEventListener('keydown', e=>{
  if((e.code==='Space'||e.code==='ArrowUp') && !e.repeat){ e.preventDefault(); onDown(); }
});
document.addEventListener('keyup', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); onUp(); }
});

// --- UPDATE ---
function update(){
  frame++;
  CLOUDS.forEach(c=>{ c.x-=c.sp; if(c.x+c.w<0) c.x=GW+20; });
  const sd=updateSeasonBlend(score);
  spawnWeather(sd); updateWeather();
  spawnLeaf(sd); updateLeaves();

  if(state!==S.PLAY) return;

  // Check turbo activation (hold)
  if(pointerDown && !turboActive && Date.now()-holdStart>HOLD_MS){
    turboActive=true;
    startTurboSound();
  }

  if(turboActive){
    addTurboFx();
    // During turbo: fly straight, no gravity
    duck.vy=0;
    duck.rot=0;
  } else {
    duck.vy+=GRAVITY;
  }
  duck.y+=duck.vy;

  pipeTimer++;
  if(pipeTimer>=PIPE_EVERY){ pipeTimer=0; spawnPipe(); }

  const spd=turboActive ? PIPE_SPEED*3 : PIPE_SPEED;
  pipes.forEach(p=>{
    p.x-=spd;
    if(!p.scored && p.x+PIPE_W<duck.x){ p.scored=true; score++; }
  });
  pipes=pipes.filter(p=>p.x+PIPE_W>-10);

  // Collision (forgiving hitbox)
  const hb=0.32;
  const dx=duck.x+DW*hb, dy=duck.y+DH*hb;
  const dw=DW*(1-hb*2), dh=DH*(1-hb*2);

  if(duck.y+DH>GH-50 || duck.y<-10){ die(); return; }
  for(const p of pipes){
    const inX=dx+dw>p.x+6 && dx<p.x+PIPE_W-6;
    if(inX && (dy<p.topH-6 || dy+dh>p.topH+PIPE_GAP+6)){ die(); return; }
  }

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=p.type==='t'?0.055:0.04; });
  particles=particles.filter(p=>p.life>0);
}

// --- DRAW ---
function drawBg(sd){
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,sd.skyTop); g.addColorStop(1,sd.skyBot);
  ctx.fillStyle=g; ctx.fillRect(0,0,GW,GH);

  // Stars always visible in evening style
  STARS.forEach(s=>{
    const a=0.3+0.4*Math.sin(s.ph+frame*0.02);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='rgba(220,220,180,'+a+')'; ctx.fill();
  });

  CLOUDS.forEach(c=>{
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.ellipse(c.x+c.w*.3,c.y,c.w*.3,20,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*.6,c.y-9,c.w*.4,27,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*.85,c.y,c.w*.25,16,0,0,Math.PI*2); ctx.fill();
  });

  TREES.forEach(t=>{
    ctx.fillStyle=sd.trunkCol;
    ctx.fillRect(t.x-t.w*.12, GH-55-t.h*.38, t.w*.24, t.h*.38);
    ctx.fillStyle=sd.leafCol;
    ctx.beginPath();
    if(sd.name==='Zima'){
      ctx.moveTo(t.x,GH-55-t.h); ctx.lineTo(t.x-t.w*.4,GH-55-t.h*.4); ctx.lineTo(t.x+t.w*.4,GH-55-t.h*.4);
    } else {
      ctx.arc(t.x, GH-55-t.h*.65, t.w*.5, 0, Math.PI*2);
    }
    ctx.fill();
  });

  const gg=ctx.createLinearGradient(0,GH-55,0,GH);
  gg.addColorStop(0,sd.groundTop); gg.addColorStop(1,sd.groundBot);
  ctx.fillStyle=gg; ctx.fillRect(0,GH-55,GW,55);
  ctx.fillStyle=sd.grassCol;
  for(let i=0;i<GW;i+=18){
    ctx.beginPath(); ctx.moveTo(i,GH-55); ctx.lineTo(i+9,GH-70); ctx.lineTo(i+18,GH-55); ctx.fill();
  }
}

function drawPipes(){
  pipes.forEach(p=>{
    const g=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
    g.addColorStop(0,'#1e6e12'); g.addColorStop(0.35,'#48c030');
    g.addColorStop(0.65,'#38a024'); g.addColorStop(1,'#124008');
    ctx.fillStyle=g;
    // Top pipe body
    ctx.beginPath(); ctx.roundRect(p.x,-4,PIPE_W,p.topH+4,[0,0,5,5]); ctx.fill();
    // Top cap
    ctx.fillStyle='#48c030';
    ctx.beginPath(); ctx.roundRect(p.x-9,p.topH-26,PIPE_W+18,26,7); ctx.fill();
    ctx.strokeStyle='#0e3508'; ctx.lineWidth=2; ctx.stroke();
    // Bottom pipe body
    const by=p.topH+PIPE_GAP;
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.roundRect(p.x,by,PIPE_W,GH-by-55,[5,5,0,0]); ctx.fill();
    // Bottom cap
    ctx.fillStyle='#48c030';
    ctx.beginPath(); ctx.roundRect(p.x-9,by,PIPE_W+18,26,7); ctx.fill();
    ctx.strokeStyle='#0e3508'; ctx.stroke();
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(p.x+8,-4,10,p.topH+4);
    ctx.fillRect(p.x+8,by+26,10,GH-by-26-55);
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life*0.85;
    ctx.fillStyle=p.type==='t' ? p.color : 'hsl('+p.hue+',100%,65%)';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawTurboFx(){
  if(!turboActive) return;
  const cx=duck.x+DW/2, cy=duck.y+DH/2;
  const pulse=0.7+0.3*Math.sin(frame*0.5);
  const grd=ctx.createRadialGradient(cx,cy,8,cx,cy,85);
  grd.addColorStop(0,'rgba(255,200,0,'+(0.55*pulse)+')');
  grd.addColorStop(0.5,'rgba(255,60,0,'+(0.3*pulse)+')');
  grd.addColorStop(1,'rgba(255,0,100,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,85,0,Math.PI*2); ctx.fill();
  ctx.save();
  ctx.font='bold 20px Georgia'; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,220,0,'+pulse+')';
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=14;
  ctx.fillText('TURBO!', cx, duck.y-12);
  ctx.restore();
}

function drawDuck(){
  ctx.save();
  const cx=duck.x+DW/2, cy=duck.y+DH/2;
  ctx.translate(cx,cy);

  // Rotation only when not in turbo
  if(!turboActive){
    const tgt=Math.max(-0.35,Math.min(0.7,duck.vy*0.07));
    duck.rot+=(tgt-duck.rot)*0.12;
  }
  ctx.rotate(duck.rot);

  // Pick image: wings up when pointer held OR turbo active
  const useWings = pointerDown || turboActive;
  const img = useWings ? imgWings : imgNormal;

  if(img.complete && img.naturalWidth>0){
    ctx.drawImage(img, -DW/2, -DH/2, DW, DH);
  } else {
    // Fallback: draw a simple duck shape
    ctx.fillStyle='#f5d800';
    ctx.beginPath(); ctx.ellipse(0,8,28,35,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff8800';
    ctx.beginPath(); ctx.ellipse(26,-4,10,8,-0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(20,-18,4,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawScore(){
  ctx.save(); ctx.textAlign='center';
  ctx.font='bold 58px Georgia';
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillText(score,GW/2+3,82);
  ctx.fillStyle='#fff'; ctx.shadowColor='#f5a623'; ctx.shadowBlur=18;
  ctx.fillText(score,GW/2,79);
  ctx.restore();
}

function drawWait(){
  ctx.save();
  ctx.fillStyle='rgba(5,15,35,0.8)';
  ctx.beginPath(); ctx.roundRect(GW/2-165,GH/2-130,330,245,22); ctx.fill();
  ctx.textAlign='center';
  ctx.font='bold 52px Georgia'; ctx.fillStyle='#f5a623';
  ctx.shadowColor='#ff7700'; ctx.shadowBlur=22;
  ctx.fillText('NATKOGRA',GW/2,GH/2-58);
  ctx.font='bold 24px Georgia'; ctx.fillStyle='#fff'; ctx.shadowBlur=6;
  ctx.fillText('Flappy Kaczka',GW/2,GH/2-18);
  ctx.shadowBlur=0;
  ctx.font='17px Georgia'; ctx.fillStyle='rgba(170,220,255,'+(0.6+0.4*Math.sin(frame*0.09))+')';
  ctx.fillText('Kliknij / dotknij aby zagrac',GW/2,GH/2+28);
  ctx.font='14px Georgia'; ctx.fillStyle='rgba(255,210,80,0.9)';
  ctx.fillText('Przytrzymaj dluzej = TURBO!',GW/2,GH/2+54);
  if(best>0){ ctx.font='16px Georgia'; ctx.fillStyle='#f5a623'; ctx.fillText('Rekord: '+best,GW/2,GH/2+84); }
  ctx.restore();
}

function drawDead(){
  if(!gameOverFartDone){ gameOverFartDone=true; playFart('gameover'); }
  ctx.save();
  ctx.fillStyle='rgba(5,5,20,0.82)';
  ctx.beginPath(); ctx.roundRect(GW/2-175,GH/2-155,350,275,22); ctx.fill();
  ctx.textAlign='center';
  ctx.font='bold 44px Georgia'; ctx.fillStyle='#ff2222';
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=26;
  ctx.fillText('GAME OVER',GW/2,GH/2-80);
  ctx.shadowBlur=0;
  ctx.font='bold 28px Georgia'; ctx.fillStyle='#fff';
  ctx.fillText('Wynik: '+score,GW/2,GH/2-32);
  if(score>0 && score>=best){
    ctx.font='bold 21px Georgia'; ctx.fillStyle='#f5a623';
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur=12;
    ctx.fillText('NOWY REKORD!',GW/2,GH/2+12);
    ctx.shadowBlur=0;
  } else if(best>0){
    ctx.font='18px Georgia'; ctx.fillStyle='#aaa';
    ctx.fillText('Rekord: '+best,GW/2,GH/2+12);
  }
  ctx.font='17px Georgia';
  ctx.fillStyle='rgba(160,210,255,'+(0.6+0.4*Math.sin(frame*0.09))+')';
  ctx.fillText('Kliknij aby zagrac ponownie',GW/2,GH/2+65);
  ctx.restore();
}

// --- MAIN LOOP ---
function loop(){
  update();
  const sd=updateSeasonBlend(score);
  ctx.clearRect(0,0,GW,GH);
  drawBg(sd);
  drawPipes();
  drawWeather();
  drawLeaves();
  drawParticles();
  drawTurboFx();
  drawDuck();
  if(state===S.PLAY || state===S.DEAD) drawScore();
  if(state===S.WAIT) drawWait();
  if(state===S.DEAD) drawDead();
  requestAnimationFrame(loop);
}
loop();
</script>
