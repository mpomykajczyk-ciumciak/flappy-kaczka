const GW = 480, GH = 640;
let scale = 1;

function resize() {

  canvas.width = GW;
  canvas.height = GH;
  canvas.style.width = (GW * s) + 'px';
  canvas.style.height = (GH * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

async function initAudio() {
  if (fartBuffer) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const binary = atob(FAK_B64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    fartBuffer = await audioCtx.decodeAudioData(bytes.buffer);
  } catch(e) { console.warn('audio init err', e); }
}

function playFart(long) {
  try {
    if (!audioCtx || !fartBuffer) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = fartBuffer;
    const gain = audioCtx.createGain();
    if (long) {
      // Loop the sound 3x with slight pitch variation for game over
      src.playbackRate.value = 0.75;
      gain.gain.value = 1.2;
    } else {
      src.playbackRate.value = 1.2 + Math.random() * 0.2;
      gain.gain.value = 0.9;
    }
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
    if (long) {
      // Play a second delayed one for longer effect
      setTimeout(() => {
        try {
          if (!audioCtx || !fartBuffer) return;
          const s2 = audioCtx.createBufferSource();
          s2.buffer = fartBuffer;
          s2.playbackRate.value = 0.6;
          const g2 = audioCtx.createGain();
          g2.gain.value = 0.8;
          s2.connect(g2);
          g2.connect(audioCtx.destination);
          s2.start();
        } catch(e){}
      }, 350);
    }
  } catch(e) { console.warn('audio err', e); }
}

// ── GAME STATE ────────────────────────────────────────────────
const S = { WAIT: 0, PLAY: 1, DEAD: 2 };
let state = S.WAIT;
let score = 0, best = 0, frame = 0;
let deadSoundPlayed = false;

// Duck
const DUCK_W = 80, DUCK_H = 120; // 2:3 aspect ratio like the image
const duck = {
  x: 100, y: GH / 2 - DUCK_H/2,
  vy: 0,
  rot: 0,
  flapTimer: 0,
};
const GRAVITY = 0.38;
const JUMP = -8.5;

// Pipes - EASY settings
const PIPE_W = 68;
const PIPE_GAP = 200;   // big gap = easier
const PIPE_SPEED = 2.4; // slow = easier
let pipes = [];
let pipeTimer = 0;
const PIPE_EVERY = 110;

// Particles
let particles = [];

// Stars
const STARS = Array.from({length:70}, () => ({
  x: Math.random()*GW, y: Math.random()*GH,
  r: Math.random()*1.8+0.4,
  phase: Math.random()*Math.PI*2
}));

// Clouds
const CLOUDS = Array.from({length:5}, (_,i) => ({
  x: i * GW/4, y: 40 + Math.random()*120,
  w: 100+Math.random()*80, speed: 0.4+Math.random()*0.3
}));

// ── HELPERS ───────────────────────────────────────────────────
function spawnPipe() {
  const minTop = 80, maxTop = GH - 80 - PIPE_GAP - 60;
  pipes.push({ x: GW + 10, topH: Math.random()*(maxTop-minTop)+minTop, scored: false });
}

function addParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5,
      vy: Math.random()*-4-1,
      life: 1,
      size: Math.random()*10+4,
      hue: Math.random()*60+10
    });
  }
}

function doJump() {
  if (state === S.WAIT) { resetGame(); return; }
  if (state === S.DEAD) { resetGame(); return; }
  if (state === S.PLAY) {
    duck.vy = JUMP;
    duck.flapTimer = 12;
    addParticles(duck.x + DUCK_W/2, duck.y + DUCK_H);
    playFart(false);
  }
}

function die() {
  state = S.DEAD;
  if (score > best) best = score;
  deadSoundPlayed = false;
}

function resetGame() {
  duck.y = GH/2 - DUCK_H/2;
  duck.vy = 0;
  duck.rot = 0;
  duck.flapTimer = 0;
  pipes = [];
  pipeTimer = 0;
  score = 0;
  frame = 0;
  particles = [];
  state = S.PLAY;
}

// ── INPUT ─────────────────────────────────────────────────────
canvas.addEventListener('pointerdown', e => { e.preventDefault(); initAudio(); doJump(); });
document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); initAudio(); doJump(); }
});

// ── UPDATE ─────────────────────────────────────────────────────
function update() {
  frame++;
  CLOUDS.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) c.x = GW + 20; });

  if (state !== S.PLAY) return;

  duck.vy += GRAVITY;
  duck.y += duck.vy;
  if (duck.flapTimer > 0) duck.flapTimer--;

  pipeTimer++;
  if (pipeTimer >= PIPE_EVERY) { pipeTimer = 0; spawnPipe(); }

  pipes.forEach(p => {
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_W < duck.x) { p.scored = true; score++; }
  });
  pipes = pipes.filter(p => p.x + PIPE_W > -10);

  // Collision (forgiving hitbox = 55% of visual size)
  const hb = 0.33;
  const dx = duck.x + DUCK_W*hb;
  const dy = duck.y + DUCK_H*hb;
  const dw = DUCK_W*(1-hb*2);
  const dh = DUCK_H*(1-hb*2);

  if (duck.y + DUCK_H > GH - 55 || duck.y < -10) { die(); return; }

  for (const p of pipes) {
    const inX = dx + dw > p.x + 6 && dx < p.x + PIPE_W - 6;
    if (inX && (dy < p.topH - 6 || dy + dh > p.topH + PIPE_GAP + 6)) { die(); return; }
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.045;
  });
  particles = particles.filter(p => p.life > 0);
}

// ── DRAW ──────────────────────────────────────────────────────
function drawBg() {
  // Sky gradient
  const g = ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#0c1f3f');
  g.addColorStop(0.6,'#1a4a6a');
  g.addColorStop(1,'#0d2810');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,GW,GH);

  // Stars
  STARS.forEach(s => {
    const a = 0.4 + 0.6*Math.sin(s.phase + frame*0.025);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,200,${a})`;
    ctx.fill();
  });

  // Clouds
  CLOUDS.forEach(c => {
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.3, c.y, c.w*0.3, 22, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.6, c.y - 10, c.w*0.4, 28, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.85, c.y, c.w*0.25, 18, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Ground
  const gg = ctx.createLinearGradient(0,GH-55,0,GH);
  gg.addColorStop(0,'#2d6b1a');
  gg.addColorStop(1,'#183d0e');
  ctx.fillStyle = gg;
  ctx.fillRect(0,GH-55,GW,55);
  // Grass blades
  ctx.fillStyle = '#3e8a22';
  for (let i = 0; i < GW; i += 18) {
    ctx.beginPath();
    ctx.moveTo(i, GH-55);
    ctx.lineTo(i+9, GH-70);
    ctx.lineTo(i+18, GH-55);
    ctx.fill();
  }
}

function drawPipes() {
  pipes.forEach(p => {
    // pipe gradient
    const g = ctx.createLinearGradient(p.x, 0, p.x+PIPE_W, 0);
    g.addColorStop(0,'#1e6e12');
    g.addColorStop(0.35,'#48c030');
    g.addColorStop(0.65,'#38a024');
    g.addColorStop(1,'#124008');
    ctx.fillStyle = g;

    // Top pipe body
    ctx.beginPath();
    ctx.roundRect(p.x, -4, PIPE_W, p.topH+4, [0,0,5,5]);
    ctx.fill();

    // Top cap
    ctx.fillStyle = '#48c030';
    ctx.beginPath();
    ctx.roundRect(p.x-9, p.topH-26, PIPE_W+18, 26, 7);
    ctx.fill();
    ctx.strokeStyle = '#0e3508';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Bottom pipe
    const by = p.topH + PIPE_GAP;
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(p.x, by, PIPE_W, GH-by-55, [5,5,0,0]);
    ctx.fill();
    // Bottom cap
    ctx.fillStyle = '#48c030';
    ctx.beginPath();
    ctx.roundRect(p.x-9, by, PIPE_W+18, 26, 7);
    ctx.fill();
    ctx.strokeStyle = '#0e3508';
    ctx.stroke();

    // Highlight stripe
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(p.x+8, -4, 10, p.topH+4);
    ctx.fillRect(p.x+8, by+26, 10, GH-by-26-55);
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = `hsl(${p.hue},100%,65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawDuck() {
  ctx.save();
  const cx = duck.x + DUCK_W/2;
  const cy = duck.y + DUCK_H/2;
  ctx.translate(cx, cy);

  // Smooth rotation
  const target = Math.max(-0.35, Math.min(0.7, duck.vy * 0.07));
  duck.rot += (target - duck.rot) * 0.12;
  ctx.rotate(duck.rot);

  // Flap squash
  const flapScale = duck.flapTimer > 0 ? 1 + 0.12*(duck.flapTimer/12) : 1;
  ctx.scale(1/flapScale, flapScale);

  if (duckImg.complete && duckImg.naturalWidth > 0) {
    ctx.drawImage(duckImg, -DUCK_W/2, -DUCK_H/2, DUCK_W, DUCK_H);
  } else {
    // fallback
    ctx.fillStyle = '#f5d800';
    ctx.beginPath();
    ctx.ellipse(0, 10, 32, 38, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.ellipse(28, -5, 12, 9, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(22, -18, 5, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

function drawScore() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 58px Georgia, serif';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText(score, GW/2+3, 82);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#f5a623';
  ctx.shadowBlur = 18;
  ctx.fillText(score, GW/2, 79);
  ctx.restore();
}

function drawWait() {
  ctx.save();
  ctx.fillStyle = 'rgba(5,15,35,0.72)';
  ctx.beginPath();
  ctx.roundRect(GW/2-165, GH/2-115, 330, 195, 22);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.font = 'bold 50px Georgia';
  ctx.fillStyle = '#f5a623';
  ctx.shadowColor = '#ff7700';
  ctx.shadowBlur = 22;
  ctx.fillText('🦆 FLAPPY', GW/2, GH/2-48);
  ctx.font = 'bold 32px Georgia';
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 8;
  ctx.fillText('KACZKA 💨', GW/2, GH/2-8);

  ctx.shadowBlur = 0;
  ctx.font = '19px Georgia';
  ctx.fillStyle = `rgba(170,220,255,${0.6+0.4*Math.sin(frame*0.09)})`;
  ctx.fillText('Kliknij / dotknij aby zagrać', GW/2, GH/2+40);
  if (best > 0) {
    ctx.fillStyle = '#f5a623';
    ctx.font = '17px Georgia';
    ctx.fillText('🏆 Rekord: ' + best, GW/2, GH/2+68);
  }
  ctx.restore();
}

function drawDead() {
  if (!deadSoundPlayed) { deadSoundPlayed = true; playFart(true); }

  ctx.save();
  ctx.fillStyle = 'rgba(5,5,20,0.75)';
  ctx.beginPath();
  ctx.roundRect(GW/2-175, GH/2-145, 350, 260, 22);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.font = 'bold 48px Georgia';
  ctx.fillStyle = '#ff2222';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 28;
  ctx.fillText('💨 GAME OVER', GW/2, GH/2-70);

  ctx.shadowBlur = 0;
  ctx.font = 'bold 30px Georgia';
  ctx.fillStyle = '#fff';
  ctx.fillText('Wynik: ' + score, GW/2, GH/2-25);

  if (score > 0 && score >= best) {
    ctx.font = 'bold 22px Georgia';
    ctx.fillStyle = '#f5a623';
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 14;
    ctx.fillText('🏆 NOWY REKORD!', GW/2, GH/2+18);
    ctx.shadowBlur = 0;
  } else if (best > 0) {
    ctx.font = '19px Georgia';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Rekord: ' + best, GW/2, GH/2+18);
  }

  ctx.font = '19px Georgia';
  ctx.fillStyle = `rgba(160,210,255,${0.6+0.4*Math.sin(frame*0.09)})`;
  ctx.fillText('Kliknij aby zagrać ponownie', GW/2, GH/2+72);
  ctx.restore();
}

// ── LOOP ──────────────────────────────────────────────────────
function loop() {
  update();
  ctx.clearRect(0,0,GW,GH);
  drawBg();
  drawPipes();
  drawParticles();
  drawDuck();
  if (state === S.PLAY || state === S.DEAD) drawScore();
  if (state === S.WAIT) drawWait();
  if (state === S.DEAD) drawDead();
  requestAnimationFrame(loop);
}

loop();
</script>
